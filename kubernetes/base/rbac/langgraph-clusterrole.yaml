apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: langgraph-role
  labels:
    app.kubernetes.io/part-of: cobalto
    app.kubernetes.io/component: langgraph
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
