apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cobalto-secrets
  namespace: soc-platform
  labels:
    app.kubernetes.io/part-of: cobalto
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cobalto-secrets
    creationPolicy: Owner
  data:
    - secretKey: openai-api-key
      remoteRef:
        key: cobalto/openai-api-key
    - secretKey: cortex-api-key
      remoteRef:
        key: cobalto/cortex-api-key
    - secretKey: opencti-api-token
      remoteRef:
        key: cobalto/opencti-api-token
    - secretKey: n8n-encryption-key
      remoteRef:
        key: cobalto/n8n-encryption-key
    - secretKey: wazuh-api-credentials
      remoteRef:
        key: cobalto/wazuh-api-credentials
