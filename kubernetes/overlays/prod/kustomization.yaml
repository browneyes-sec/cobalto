apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: cobalto-prod

nameSuffix: -prod

commonLabels:
  environment: production
  app.kubernetes.io/part-of: cobalto-soc

commonAnnotations:
  environment.cobalto.io/managed-by: platform-team
  environment.cobalto.io/tier: production

patches:
  - target:
      kind: Deployment
      name: langgraph-agent-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: wazuh-manager
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: cortex
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: StatefulSet
      name: qdrant
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: StatefulSet
      name: vault
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: langgraph-agent-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "8Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "4000m"
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /metadata/annotations/environment.cobalto.io~1env
        value: production
      - op: add
        path: /metadata/annotations/environment.cobalto.io~1sla-tier
        value: tier1
      - op: add
        path: /spec/template/metadata/annotations/environment.cobalto.io~1backup
        value: "enabled"
      - op: add
        path: /spec/template/metadata/annotations/environment.cobalto.io~1audit
        value: "enabled"
