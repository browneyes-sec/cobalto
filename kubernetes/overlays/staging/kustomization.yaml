apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: cobalto-staging

nameSuffix: -staging

commonLabels:
  environment: staging
  app.kubernetes.io/part-of: cobalto-soc

commonAnnotations:
  environment.cobalto.io/managed-by: devops
  environment.cobalto.io/tier: staging

patches:
  - target:
      kind: Deployment
      name: langgraph-agent-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: wazuh-manager
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: cortex
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: StatefulSet
      name: qdrant
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: vault
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /metadata/annotations/environment.cobalto.io~1env
        value: staging
      - op: add
        path: /spec/template/metadata/annotations/environment.cobalto.io~1load-test
        value: "enabled"
