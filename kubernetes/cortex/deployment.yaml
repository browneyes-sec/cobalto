apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex
  namespace: cortex
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/version: "3.1.8"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex
    spec:
      containers:
        - name: cortex
          image: thehiveproject/cortex:3.1.8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
              name: http
              protocol: TCP
          env:
            - name: PLAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: cortex-secrets
                  key: play-secret
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/cortex/application.conf
              subPath: application.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/status/public/version
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status/public/version
              port: 9001
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: cortex-config
