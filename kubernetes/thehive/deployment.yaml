apiVersion: apps/v1
kind: Deployment
metadata:
  name: thehive
  namespace: thehive
  labels:
    app.kubernetes.io/name: thehive
    app.kubernetes.io/version: "5.2.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thehive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thehive
    spec:
      containers:
        - name: thehive
          image: thehiveproject/thehive:5.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: http
              protocol: TCP
          env:
            - name: PLAY_HTTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: thehive-secrets
                  key: play-http-secret
            - name: PLAY_EVOLUTIONS_DB_CONFIG_DRIVER
              value: org.postgresql.Driver
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: config
              mountPath: /etc/thehive/application.conf
              subPath: application.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/status/public/version
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/status/public/version
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: thehive-config
