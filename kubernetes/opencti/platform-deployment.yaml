apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencti-platform
  namespace: opencti
  labels:
    app.kubernetes.io/name: opencti-platform
    app.kubernetes.io/part-of: opencti
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opencti-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencti-platform
    spec:
      containers:
        - name: opencti-platform
          image: opencti/platform:6.0.0
          ports:
            - containerPort: 4000
          env:
            - name: OPENCTI_ES_HOSTS
              value: "http://elasticsearch:9200"
            - name: OPENCTI_REDIS_HOSTNAME
              value: "redis"
            - name: OPENCTI_RABBITMQ_HOSTNAME
              value: "rabbitmq"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "1"
