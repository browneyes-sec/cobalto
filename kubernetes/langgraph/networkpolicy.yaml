apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: langgraph-agent-service
  namespace: langgraph
  labels:
    app.kubernetes.io/name: langgraph-agent-service
    app.kubernetes.io/part-of: cobalto-soc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: langgraph-agent-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: n8n
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
      ports:
        - protocol: TCP
          port: 6333
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: opencti
      ports:
        - protocol: TCP
          port: 4000
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: cortex
      ports:
        - protocol: TCP
          port: 9001
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - protocol: TCP
          port: 8200
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
