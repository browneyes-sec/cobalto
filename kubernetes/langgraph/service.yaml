apiVersion: v1
kind: Service
metadata:
  name: langgraph-agent-service
  namespace: langgraph
  labels:
    app.kubernetes.io/name: langgraph-agent-service
    app.kubernetes.io/part-of: cobalto-soc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: langgraph-agent-service
  ports:
    - name: api
      port: 80
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
