apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agent-service
  namespace: langgraph
  labels:
    app.kubernetes.io/name: langgraph-agent-service
    app.kubernetes.io/part-of: cobalto-soc
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: langgraph-agent-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langgraph-agent-service
        app.kubernetes.io/part-of: cobalto-soc
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: langgraph-sa
      containers:
        - name: langgraph-agent
          image: YOUR_ECR_REPO/langgraph-agent:1.0.0
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: langgraph-secrets
                  key: openai-api-key
            - name: QDRANT_URL
              value: "http://qdrant.qdrant.svc.cluster.local:6333"
            - name: OPENCTI_URL
              value: "http://opencti.opencti.svc.cluster.local:4000"
            - name: CORTEX_URL
              value: "http://cortex.cortex.svc.cluster.local:9001"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
