global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "langgraph-api"
    static_configs:
      - targets: ["langgraph-api:8000"]
    metrics_path: /metrics

  - job_name: "n8n"
    static_configs:
      - targets: ["n8n:5678"]
    metrics_path: /metrics

  - job_name: "wazuh"
    static_configs:
      - targets: ["wazuh-manager:55000"]
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: /_prometheus/metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]