{{/*
Cobalto Secrets Template
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: cobalto
type: Opaque
data:
  # Database
  database-url: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/cobalto" .Values.postgresql.host .Values.postgresql.port | b64enc | quote }}
  database-host: {{ .Values.postgresql.host | b64enc | quote }}
  database-user: {{ "cobalto" | b64enc | quote }}
  database-password: {{ .Values.secrets.postgresqlPassword | default "" | b64enc | quote }}
  
  # Redis
  redis-url: {{ printf "redis://:%s@%s:%d/0" .Values.secrets.redisPassword .Values.redis.host .Values.redis.port | b64enc | quote }}
  
  # JWT
  jwt-secret: {{ .Values.secrets.jwtSecretKey | default "" | b64enc | quote }}
  
  # n8n
  n8n-user: {{ "admin" | b64enc | quote }}
  n8n-password: {{ .Values.secrets.n8nPassword | default "" | b64enc | quote }}
  
  # Wazuh
  wazuh-password: {{ .Values.secrets.wazuhPassword | default "" | b64enc | quote }}
  
  # OpenCTI
  opencti-token: {{ .Values.secrets.openctiToken | default "" | b64enc | quote }}
  
  # TheHive
  thehive-token: {{ .Values.secrets.thehiveToken | default "" | b64enc | quote }}
  
  # Cortex
  cortex-token: {{ .Values.secrets.cortexToken | default "" | b64enc | quote }}
  
  # Slack
  slack-bot-token: {{ .Values.secrets.slackBotToken | default "" | b64enc | quote }}
  slack-signing-secret: {{ .Values.secrets.slackSigningSecret | default "" | b64enc | quote }}
  
  # API Keys
  virustotal-api-key: {{ .Values.secrets.virustotalApiKey | default "" | b64enc | quote }}
  abuseipdb-api-key: {{ .Values.secrets.abuseipdbApiKey | default "" | b64enc | quote }}
  shodan-api-key: {{ .Values.secrets.shodanApiKey | default "" | b64enc | quote }}
---
{{/*
External Secrets for cloud-managed services
*/}}
{{- if not .Values.postgresql.existingSecret }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-db-credentials
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-db-credentials
  data:
    - secretKey: password
      remoteProperty: cobalto/{{ .Release.Namespace }}/database/password
{{- end }}
