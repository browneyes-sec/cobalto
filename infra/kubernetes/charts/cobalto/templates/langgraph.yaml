{{/*
Cobalto LangGraph API Deployment
*/}}
{{- if .Values.langgraph.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-langgraph
  labels:
    app.kubernetes.io/name: langgraph
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.langgraph.image.tag | default "latest" }}
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cobalto
spec:
  replicas: {{ .Values.langgraph.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: langgraph
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langgraph
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ .Release.Name }}-langgraph
      containers:
        - name: langgraph
          image: "{{ .Values.langgraph.image.repository }}:{{ .Values.langgraph.image.tag }}"
          imagePullPolicy: {{ .Values.langgraph.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: {{ .Release.Name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-url
            - name: QDRANT_URL
              value: "http://{{ .Release.Name }}-qdrant:6333"
            - name: OPENCTI_URL
              value: "http://{{ .Release.Name }}-opencti:4000/graphql"
            - name: THEHIVE_URL
              value: "http://{{ .Release.Name }}-thehive:9000/api"
            - name: CORTEX_URL
              value: "http://{{ .Release.Name }}-cortex:9001/api"
            - name: WAZUH_URL
              value: "https://{{ .Release.Name }}-wazuh-manager:55000"
            - name: N8N_URL
              value: "http://{{ .Release.Name }}-n8n:5678"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.langgraph.resources | nindent 12 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-langgraph
  labels:
    app.kubernetes.io/name: langgraph
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.langgraph.service.type }}
  ports:
    - port: {{ .Values.langgraph.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: langgraph
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-langgraph
  labels:
    app.kubernetes.io/name: langgraph
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
